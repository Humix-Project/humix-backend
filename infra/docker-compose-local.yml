services:
  # 1. MariaDB (데이터베이스)
  wagle-db:
    image: mariadb:10.11
    container_name: humix-mariadb
    restart: always
    ports:
      - "13306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root  # application-local.yml 비밀번호랑 맞춰주세요!
      MARIADB_DATABASE: humix # 자동으로 생성될 DB 이름
      TZ: Asia/Seoul
    command: # 한글 깨짐 방지 설정
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci